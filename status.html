<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="layouts">
    <section class="navbar">
        <h1>SMART CAR</h1>
    </section>
    <section class="page-title">
        <h3>CAR STATUS</h3>
    </section>
    <div class="live-data">
    <div class="data-item">
        <h1>Coolant temperature [°C]</h1>
        <span id="coolant" class="data-result">73</span>
    </div>

    <div class="data-item">
        <h1>Manifold pressure [kPa]</h1>
        <span id="map" class="data-result">97</span>
    </div>

    <div class="data-item">
        <h1>Engine RPM [1/min]</h1>
        <span id="rpm" class="data-result" >850</span>
    </div>

    <div class="data-item">
        <h1>Speed [km/h]</h1>
        <span id="speed" class="data-result">0</span>
    </div>

    <div class="data-item">
        <h1>Intake air temperature [°C]</h1>
        <span id="iat" class="data-result">31</span>
    </div>

    <div class="data-item">
        <h1>MAF rate [g/sec]</h1>
        <span id="maf" class="data-result">8</span>
    </div>

    <div class="data-item">
        <h1>Fuel pressure [bar]</h1>
        <span id="fuel" class="data-result">264</span>
    </div>

    <div class="data-item">
        <h1>Ambient LED brightness</h1>
        <span id="led" class="data-result">255</span>
    </div>
</div>
    <section class="bottombar">
        <ul>
            <li><a href="index.html"><i class="fa-solid fa-home"></i></a></li>
            <li><a href="status.html"><i class="fa-solid fa-gears"></i></a></li>
            <li><a href="setting.html"><i class="fa-solid fa-screwdriver-wrench"></i></a></li>
            <li><a href="akun.html"><i class="fa-solid fa-user "></i></a></li>
        </ul>
    </section>
</div>
    <script src="main.js"></script>
    
</body>
</html>
